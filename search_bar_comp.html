<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Bar Component</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="search_bar_comp.css">
</head>
<body>

    <main class="search-wrapper">
        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Search Attractions" autocomplete="off">
                <button id="search-btn" class="search-button">
                    <img src="icons8-search.svg" alt="Search Icon">
                </button>
            </div>

            <div class="search-dropdown-wrapper">
            <div class="search-dropdown"> 
                <div class="search-history-wrapper">
                <div class="search-history-label-container">
                    <span class="search-history-label">Search History</span>
                </div>
                <div class="search-history-container">
                    <div class="search-history-lists">
                        <div class="history-pill">Fort Santiago</div>
                        <div class="history-pill">Manila Cathedral</div>
                        <div class="history-pill">Baluarte de San Diego</div>
                    </div>
                </div>
                </div>
                <div class="intramuros-attractions-wrapper">
                    <div class="intramuros-attractions-label-container">
                        <span class="intramuros-attractions-label">Intramuros Attractions</span>
                    </div>
                    <div class="intramuros-attractions-container">
                        <div class="intramuros-attractions-lists">
                            <div class="attraction-card" data-id="1">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">Fort Santiago</span>
                            </div>
                            <div class="attraction-card" data-id="2">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">San Agustin Church</span>
                            </div>
                            <div class="attraction-card" data-id="3">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">Fort Santiago</span>
                            </div>
                            <div class="attraction-card" data-id="4">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">San Agustin Church</span>
                            </div>
                            <div class="attraction-card" data-id="5">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">Fort Santiago</span>
                            </div>
                            <div class="attraction-card" data-id="6">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">San Agustin Church</span>
                            </div>
                            <div class="attraction-card" data-id="7">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">Fort Santiago</span>
                            </div>
                            <div class="attraction-card" data-id="8">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">San Agustin Church</span>
                            </div>
                            <div class="attraction-card" data-id="9">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">Fort Santiago</span>
                            </div>
                            <div class="attraction-card" data-id="10">
                                <img src="fort-santaigo-1.jpeg" alt="Attraction">
                                <span class="attraction-name">San Agustin Church</span>
                            </div>
                        </div>
                </div>
            </div>
            </div>
        </div>
        </div>
    </main>

    <script src="search_bar_comp.js"></script>
</body>
</html>
