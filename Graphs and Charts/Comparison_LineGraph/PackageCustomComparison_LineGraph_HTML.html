<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentramuros - Package Comparison</title>
    <link rel="stylesheet" href="Comparison_LineGraph_CSS.css">
</head>
<body>

    <div class="chart-dashboard">
        <h2 class="chart-title">Package and Custom Monthly Comparison</h2>
        
        <div class="canvas-container">
            <canvas id="tourChart" width="800" height="400"></canvas>
        </div>

        <div class="chart-legend">
            <div class="legend-item">
                <span class="legend-box packages-box"></span>
                <span class="legend-label">Packages</span>
            </div>
            <div class="legend-item">
                <span class="legend-box custom-box"></span>
                <span class="legend-label">Custom</span>
            </div>
        </div>
    </div>

    <script src="Comparison_LineGraph_JS.js"></script>
</body>
</html>
