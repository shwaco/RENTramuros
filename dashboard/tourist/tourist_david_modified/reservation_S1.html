<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVATION | STEP 1</title>
    <link rel="stylesheet" href="reservation_S1.css">
</head>
<body>
    <div class="reservation-container">
        <div class="reservation-label">RESERVATION LABEL</div>
        <div class="process-container">
            <div class="steps-container">
            <div class="steps">
                <span class="circle-1">1</span>
                <span class="circle-2">2</span>
                <span class="circle-3">3</span>
                <div class="progress-bar">
                    <span class="indicator"></span>
                </div>
            </div>
            </div>
        </div>
        <div class="date-guests-container">
            <div class="date-container"> <!-- date input (with time tentative)-->
                <div class="date-label">DATE OF VISIT</div>
                    <!-- date input mechanism -->
            </div>
            <div class="guests-container">
                <div class="guests-label">NUMBER OF GUESTS</div>
                    <!-- number of guests input mechanism -->
                     <div class="guests-wrapper">
                    <div class="adults">
                        <div class="adults-label">ADULTS</div>
                        <div class="adult-quantity-container">
                            <div class="adult-quantity">
                                <button type="button" class="minus">-</button>
                                <span class="adult-count">0</span>
                                <button type="button" class="plus">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="children">
                        <div class="children-label">CHILDREN</div>
                        <div class="children-quantity-container">
                            <div class="children-quantity">
                                <button type="button" class="minus">-</button>
                                <span class="children-count">0</span>
                                <button type="button" class="plus">+</button>
                            </div>
                        </div>
                    </div>
            </div>
            </div>
            </div>
        <div class="steps-buttons">
            <button id="prev">Prev</button>
            <button onclick="window.location.href='reservation_S2.html';"id="next">Next</button>
        </div>
    </div>

    <script src="reservation_allS.js"></script>
</body>
</html>
