<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVATION | STEP 3</title>
    <link rel="stylesheet" href="reservation_S3.css">
</head>
<body>
    <div class="reservation-container">
        <div class="reservation-label">RESERVATION LABEL</div>
        <div class="process-container">
            <div class="steps-container">
            <div class="steps">
                <span class="circle-1">1</span>
                <span class="circle-2">2</span>
                <span class="circle-3">3</span>
                <div class="progress-bar">
                    <span class="indicator"></span>
                </div>
            </div>
            </div>
        </div>
    <div class="contact-information-container">
            <div class="contact-info-label">CONTACT INFORMATION</div>
    
            <div class="contact-fields-wrapper">
                <div class="full-name-container">
                    <div class="full-name-label">FULL NAME</div>
                    <input type="text" class="full-name-input" placeholder="First Name, M.I., Last Name">
                </div>
        
                <div class="email-container">
                    <div class="email-label">EMAIL ADDRESS</div>
                    <input type="email" class="email-input" placeholder="Enter your email address">
                </div>
        
                <div class="phone-container">
                    <div class="phone-label">PHONE NUMBER</div>
                    <input type="tel" class="phone-input" placeholder="Enter your phone number" maxlength="11" pattern="[0-9]{11}">
                    </div>
                </div>
        </div>
        <div class="steps-buttons">
            <button onclick="window.location.href='reservation_S2.html';"id="prev">Prev</button>
            <button id="confirm">Confirm</button>
        </div>
    </div>
</body>
</html>
