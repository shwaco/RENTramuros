<html lang="en">

    <meta charset="UTF-8">

    <title>Rentramuros (Reservation)</title>

<body>
    <div class="reservation-container">
        <div class="process-container">
            <div class="steps-container">
                <div class="process-container">
                    <div class="steps">
                        <div class="circle-1">1</div>
            
                        <div class="progress-bar-1"></div>
            
                        <div class="circle-2">2</div>
            
                        <div class="progress-bar-2"></div>
            
                        <div class="circle-3">3</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="time-date-container">
            <div class="text-box"><span class="time-date-text">When will this journey be?</span>
            </div>  
                <span class="time-date-label">TIME & DATE</span>
            <div class="dropdown-container">
            <div class="time-dropdown">
            <div class="time-select">
                <span class="time-selected">18:00</span>
                <!--<div class="time-caret"></div>
            </div>
            <ul class="time">
                <li>07:00</li>
                <li>08:00</li>
                <li>09:00</li>
                <li>10:00</li>

        </div>
        </div>
        <div class="date-dropdown">
            <div class="date-select">
                <span class="date-selected">April 29, 2026</span>
                <div class="date-caret"></div>
            </div>
        </div>
    </div>
    </div>

    <div class="tourists-quantity-conatiner">
        <div class="text-box"><span class="tourists-quantity-text">How many tourist are in this journey? </span>
        </div>
        <div class="quantity-container">
            <div class="adults-container">
                <div class="adults-label-container">
                <span class="adults-label">ADULTS</span>
                <span class="adults-req-age">(18 years old and above)</span>
                </div>
                <div class="adult-counter-row">
                <div class="adult-quantity-counter">
                    <button type="button" class="minus">-</button>
                    <span class="adult-count">0</span>
                    <button type="button" class="plus">+</button>
                </div>
                <div class="senior-notice-container">
                    <span class="notice-circle"></span>
                    <span class="senior-notice-text">Includes seniors (ages 60+)</span>
                </div>
                </div>
            </div>
            <div class="children-container">
                <div class="children-label-container">
                <span class="children-label">CHILDREN</span>
                <span class="children-req-age">(2 to 17 years old)</span>
                </div>
                <div class="children-quantity-counter">
                    <button type="button" class="minus">-</button>
                    <span class="adult-count">0</span>
                    <button type="button" class="plus">+</button>
                </div>
            </div>
            <div class="infants-container">
                <div class="infants-label-container">
                <span class="infants-label">CHILDREN</span>
                <span class="infants-req-age">(2 to 17 years old)</span>
                </div>
                <div class="infants-quantity-counter">
                    <button type="button" class="minus">-</button>
                    <span class="adult-count">0</span>
                    <button type="button" class="plus">+</button>
                </div>
            </div>
        </div>
    </div>
    <div class="package-confirm-container">
        <div class="text-box"><span class="availing-package-text">Availing for package?</span>
        </div>
    <div class="confirming-package-button-container">
        <button class="no-package">NO</button>
        <button class="yes-package">YES</button>
    </div>
    </div>

    <div class="prev-next-container">
        <button onclick="window.location.href='tours_step2_packages.html';"class="next-button">NEXT</button>
    </div>
    </div>
