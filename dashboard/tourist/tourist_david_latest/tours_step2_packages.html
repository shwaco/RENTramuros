<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentramuros (Reservation)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="tours_step2_packages.css">
</head>
<body>
    <div class="reservation-container">
        <div class="process-container">
            <div class="steps-container">
                <div class="process-container">
                    <div class="steps">
                        <div class="circle-1">1</div>
            
                        <div class="progress-bar-1"></div>
            
                        <div class="circle-2">2</div>
            
                        <div class="progress-bar-2"></div>
            
                        <div class="circle-3">3</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="packages-container">
            <div class="text-box"><span class="packages-text">Choose a package to experience</span>
            </div>  
            <div class="package-options-container">
                <div class="package-1">
                    <div class="package-image"><img src="https://dummyimage.com/hd1080"></div>
                    <div class="package-details-text">
                    <span class="package-label">Package 1</span>
                    <span class="package-1-inclusion">Casa el nognog + La conte + San Agustin Church + La...</span>
                    <span class="package-1-price">₱67,6767</span>
                    </div>
                </div>
                <div class="package-2">
                    <div class="package-image"><img src="https://dummyimage.com/hd1080"></div>
                    <div class="package-details-text">
                    <span class="package-label">Package 1</span>
                    <span class="package-2-inclusion">Casa el nognog + La conte + San Agustin Church + La...</span>
                    <span class="package-2-price">₱67,6767</span>
                    </div>
                </div>
                <div class="package-3">
                    <div class="package-image"><img src="https://dummyimage.com/hd1080"></div>
                    <div class="package-details-text">
                    <span class="package-label">Package 1</span>
                    <span class="package-3-inclusion">Casa el nognog + La conte + San Agustin Church + La...</span>
                    <span class="package-3-price">₱67,6767</span>
                    </div>
                </div>
            </div>
    </div>

    <div class="select-vehicle-packages-conatiner">
        <div class="text-box"><span class="select-vehicle-text">Choose a vehicle to ride</span>
        </div>
        <div class="vehicle-container">
            <div class="no-vehicle"><span class="none-text">NONE</span></div>
            <div class="vehicle-1">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="vehicle-2">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="vehicle-3">
                <img src="https://dummyimage.com/hd1080">
            </div>
        </div>
    </div>

    <div class="prev-next-container">
        <button onclick="window.location.href='tours_step1.html';"class="prev-button">PREVIOUS</button>
        <button onclick="window.location.href='tours_step3.html';"class="next-button">NEXT</button>
    </div>
    </div>
</body>
</html>
