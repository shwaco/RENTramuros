<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentramuros (Reservation)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tours_step3.css">

</head>
<body>
    <div class="reservation-container">
        <div class="process-container">
            <div class="steps-container">
                <div class="process-container">
                    <div class="steps">
                        <div class="circle-1">1</div>
            
                        <div class="progress-bar-1"></div>
            
                        <div class="circle-2">2</div>
            
                        <div class="progress-bar-2"></div>
            
                        <div class="circle-3">3</div>
                    </div>
                </div>
            </div>
        </div>
    <div class="contact-info-container">
        <div class="text-box"><span class="contact-info-text">Provide your contact information for safer and easier travel experience</span>
        </div>
        <div class="info-content-container">
            <div class="full-name-container">
                <div class="full-name-label-container">
                    <span class="full-name-label">FULL NAME</span>
                </div>
                    <input type="text" class="full-name-input" placeholder="First Name, M.I., Last Name">
            </div>

            <div class="email-container">
                <div class="email-label-container">
                    <span class="email-label">EMAIL ADDRESS</span>
                </div>
                    <input type="text" class="email-input" placeholder="Enter your email address">
            </div>

            <div class="phone-container">
                <div class="phone-label-container">
                    <span class="phone-label">PHONE NUMBER</span>
                </div>
                    <input type="text" class="phone-input" placeholder="Enter your phone number">
            </div>
        </div>
    </div>

    <div class="prev-next-container">
        <button onclick="window.location.href='tours_step2_packages.html';"class="prev-button">PREVIOUS</button>
        <button class="submit-button">SUBMIT</button>
    </div>

    </div>
</body>
</html>
