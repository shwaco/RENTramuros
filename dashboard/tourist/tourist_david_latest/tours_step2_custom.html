<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentramuros (Reservation)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="tours_step2_custom.css">
</head>
<body>
    <div class="reservation-container">
        <div class="process-container">
            <div class="steps-container">
                <div class="process-container">
                    <div class="steps">
                        <div class="circle-1">1</div>
            
                        <div class="progress-bar-1"></div>
            
                        <div class="circle-2">2</div>
            
                        <div class="progress-bar-2"></div>
            
                        <div class="circle-3">3</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="attractions-container">
            <div class="text-box"><span class="attractions-text">Choose the attractions to experience</span>
            </div>  
            <div class="attractions-options-container">
            <div class="attraction-layer-1">
            <div class="attraction-1">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-2">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-3">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-4">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-5">
                <img src="https://dummyimage.com/hd1080">
            </div>
            </div>
            <div class="attraction-layer-2">
            <div class="attraction-6">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-7">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-8">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-9">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="attraction-10">
                <img src="https://dummyimage.com/hd1080">
            </div>
            </div>
            </div>
        </div>

        <div class="custom-select-vehicle-conatiner">
        <div class="text-box"><span class="custom-select-vehicle-text">Choose a vehicle to ride</span>
        </div>
        <div class="custom-vehicle-container">
            <div class="custom-no-vehicle"><span class="none-text">NONE</span></div>
            <div class="custom-vehicle-1">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="custom-vehicle-2">
                <img src="https://dummyimage.com/hd1080">
            </div>
            <div class="custom-vehicle-3">
                <img src="https://dummyimage.com/hd1080">
            </div>
        </div>
    </div>

    <div class="prev-next-container">
        <button class="prev-button">PREVIOUS</button>
        <button class="next-button">NEXT</button>
    </div>
    
    </div>
</body>
</html>
