<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intramuros Map</title>
    />
  </head>
  <body>
    <div id="map"></div>
    <div id="square-info-box" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); z-index: 9999; font-family: sans-serif;">
    
    <button onclick="document.getElementById('square-info-box').style.display='none'" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 18px; cursor: pointer; color: #555;">✖</button>
        <h2 id="info-title" style="margin: 0 0 10px 0; font-size: 22px; color: #333;">Title</h2>
    <p id="info-text" style="font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px;">Details</p>
    
    <a id="info-btn" href="#" target="_blank" style="display: block; text-align: center; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold;">
        Book Now
    </a>
</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
