<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Signup Page</title>
</head>
<body>
    <h1 class="text-center mt-4">Sign Up</h1>
    <div class="container mt-5">
        <div id="alertbox"></div>
        <form id="SignupForm">
            <div class="mb-3">
                <label for="firstnameInput" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstnameInput" placeholder="Enter your first name" required>
            </div>
            <div class="mb-3">
                <label for="lastnameInput" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastnameInput" placeholder="Enter your last name" required>
            </div>
            <div class="mb-3">
                <label for="emailInput" class="form-label">Email</label>
                <input type="email" class="form-control" id="emailInput" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label">Password</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password" required>
            </div>
             <div class="mb-3">
                <label for="phoneInput" class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="phoneInput" placeholder="Enter your phone number" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">Login</button>
        </form>
    </div>
    <script>    
        document.getElementById('SignupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const firstname = document.getElementById('firstnameInput').value;
            const lastname = document.getElementById('lastnameInput').value;
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const phone = document.getElementById('phoneInput').value;
            const alertBox = document.getElementById('alertbox');

            fetch('signup_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=UTF-8',
                    'Access-Control-Allow-Origin': '*'
                },
                body: JSON.stringify({ first_name: firstname, last_name: lastname, email: email, password_hash: password, phone_number: phone })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alertBox.innerHTML = `<div class="alert alert-success" role="alert">${data.message}</div>`;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    alertBox.innerHTML = `<div class="alert alert-danger" role="alert">${data.message}</div>`;
                }
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
