<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentramuros (Reservation)</title>
  
<link rel="stylesheet" href="reservation.css">

</head>
<body>

  <h3>
    <div class="reservation-form-headlabel">Contact Information</div>
  </h3>

  <!-- fill up form of information-->
<div class="reservation-form">
<form id="ReservationForm">

<div class="form-row">

<label class="form-label" for="name">Last Name, First Name:</label>
<input class="name-bar" type="text" id="name" name="name" placeholder="First name, Last name" required>
</div>

<div class="form-row">

<label class="form-label" for="email">Email Address:</label>
<input class="email-bar" type="email" id="email" name="email" placeholder="Enter your email address" required>
</div>

<div class="form-row">
<label class="form-label" for="phone">Phone Number:</label>
<input class="phone-bar" type="tel" id="phone" name="phone" placeholder="Enter your phone number" maxlength="11" pattern="[0-9]{11}" required>
</div>

<button class="submit-button" type="submit" id="submit">Confirm</button>

</form>
</div>

<div id="popup" class="modal">
  <div class="modal-content">
    <span id="closeBtn" class="close">&times;</span>
    <h3>Reservation Confirmation</h3>
    <div id="modalText"></div>
    <button class="submitFinal-button" type="submitFinal" id="submitFinal">Submit Confirmation</button>
  </div>
</div>

<script src="reservation.js"></script>

</body>
</html>
